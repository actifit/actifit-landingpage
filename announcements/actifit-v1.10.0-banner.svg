<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Warm athletic sunset gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3a1c0a"/>
      <stop offset="35%" stop-color="#7a2a1a"/>
      <stop offset="70%" stop-color="#c43a1f"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="80%" cy="20%" r="55%">
      <stop offset="0%"  stop-color="#ffd06a" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ff8a3d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a2a1a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="trackGlow" cx="50%" cy="100%" r="80%">
      <stop offset="0%"   stop-color="#1a0a05" stop-opacity="0.65"/>
      <stop offset="60%"  stop-color="#1a0a05" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#1a0a05" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent gradient for "Smarter Rewards" -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffb53d"/>
    </linearGradient>

    <!-- Motion lines (faint track suggestion) -->
    <pattern id="tracklines" x="0" y="0" width="240" height="36" patternUnits="userSpaceOnUse">
      <rect width="240" height="36" fill="none"/>
      <path d="M0 18 L210 18" stroke="rgba(255,255,255,0.04)" stroke-width="2" stroke-linecap="round"/>
    </pattern>

    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

